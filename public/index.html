<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Findy - AI Assistant</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <h2>Findy</h2>
        <span class="status-badge online">● Online</span>
      </div>
      <div class="sidebar-sources">
        <div class="sources-label">Sources</div>
        <div class="source-item">
          <img src="https://www.autotrader.co.za/favicon.ico" alt="AT" class="source-logo">
          <span>AutoTrader</span>
        </div>
        <div class="source-item">
          <img src="https://www.webuycars.co.za/favicon.ico" alt="WBC" class="source-logo">
          <span>WeBuyCars</span>
        </div>
        <div class="source-item">
          <img src="https://i.imgur.com/hBGRCjN.png" alt="Cars" class="source-logo">
          <span>Cars.co.za</span>
        </div>
        <div class="source-item">
          <img src="https://www.carfind.co.za/favicon.ico" alt="CF" class="source-logo">
          <span>Car Find</span>
        </div>
      </div>

      <div class="sidebar-section-label">CONNECTED</div>
      <div class="conversations">
        <div class="conv-item business-item" data-mode="connected" id="chat-connected">
          <span class="conv-icon biz-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="7" width="20" height="14" rx="2"/>
              <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
              <path d="M12 12v4"/>
              <path d="M10 14h4"/>
            </svg>
          </span>
          <span class="conv-name">Nissan Springs</span>
          <span class="badge-connected">●</span>
        </div>
      </div>

      <div class="conversations" id="conversations-list">
      </div>

      <div class="sidebar-footer">
        <button id="reset-btn" class="reset-btn">
          <span>⟳</span> New Conversation
        </button>
        <button id="logout-btn" class="reset-btn" style="margin-top:8px;">
          <span>↩</span> Log out
        </button>
      </div>
    </aside>

    <main id="main">
      <header id="header">
        <div class="header-left">
          <div id="menu-toggle">☰</div>
          <div class="header-info">
            <img src="logo.png" alt="Nissan Springs" class="header-logo">
          </div>
        </div>
      </header>

      <div id="chat-container">
        <div id="messages">
          <div class="message welcome">
            <div class="bubble-header">Nissan Springs AI</div>
            <div class="bubble">
              <div class="bubble-content">At your service, sir. I'm <strong>Nissan Springs AI</strong> — ready to help with whatever you need. What can I do for you?</div>
            </div>
          </div>
        </div>
        <div id="typing-indicator" class="hidden">
          <div class="typing-dots">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>

      <div id="input-area">
        <div class="input-wrapper">
          <textarea id="chat-input" rows="1" placeholder="Ask me anything, sir..."></textarea>
          <button id="send-btn" disabled>
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="19" x2="12" y2="5"></line>
              <polyline points="5 12 12 5 19 12"></polyline>
            </svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <script src="/app.js?v=2"></script>
</body>
</html>
