<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ironman AI</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <h2>Ironman AI</h2>
        <span class="status-badge online">● Online</span>
      </div>
      <div class="conversations">
        <div class="conv-item active">
          <span class="conv-icon">💬</span>
          <span class="conv-name">Current Chat</span>
        </div>
      </div>
      <div class="sidebar-footer">
        <button id="reset-btn" class="reset-btn">
          <span>⟳</span> New Conversation
        </button>
        <div class="system-info">
          <span>v1.0</span>
        </div>
      </div>
    </aside>

    <main id="main">
      <header id="header">
        <div class="header-left">
          <div id="menu-toggle">☰</div>
          <div class="header-info">
            <h1>Ironman AI</h1>
          </div>
        </div>
      </header>

      <div id="chat-container">
        <div id="messages">
          <div class="message welcome">
            <div class="bubble-header">Ironman AI</div>
            <div class="bubble">
              <div class="bubble-content">Hey there! I'm <strong>Ironman AI</strong> — your assistant. How can I help you today?</div>
            </div>
          </div>
        </div>
        <div id="typing-indicator" class="hidden">
          <div class="typing-dots">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>

      <div id="input-area">
        <div class="input-wrapper">
          <textarea id="chat-input" rows="1" placeholder="Ask me anything..."></textarea>
          <button id="send-btn" disabled>
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="19" x2="12" y2="5"></line>
              <polyline points="5 12 12 5 19 12"></polyline>
            </svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
